name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content src/Schematch.App/Schematch.App.csproj
          $base = ($proj.Project.PropertyGroup.Version | Where-Object { $_ }) -as [string]
          if (-not $base) { $base = "0.0.0" }
          $tag = "v$base.${{ github.run_number }}"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "base=$base" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish Schematch.App (win-x64)
        run: >
          dotnet publish src/Schematch.App/Schematch.App.csproj
          -c Release
          -o dist/win-x64

      - name: Zip publish output
        shell: pwsh
        run: Compress-Archive -Path dist/win-x64/* -DestinationPath "Schematch-${{ steps.version.outputs.tag }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Schematch ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            Schematch-*-win-x64.zip
            dist/win-x64/Schematch.App.exe
          generate_release_notes: true
