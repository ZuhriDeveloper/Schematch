name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish Schematch.App (win-x64)
        run: >
          dotnet publish src/Schematch.App/Schematch.App.csproj
          -c Release
          -o dist/win-x64

      - name: Zip publish output
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          Compress-Archive -Path dist/win-x64/* -DestinationPath "Schematch-$tag-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Schematch ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            Schematch-*-win-x64.zip
            dist/win-x64/Schematch.App.exe
          generate_release_notes: true
